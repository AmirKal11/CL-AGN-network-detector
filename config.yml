# Project paths
data:
  processed_catalog: 'data/processed_agn_new_MAD_scaling.parquet'

# Neural Network Training Configurations
training:
  batch_size: 256
  learning_rate: 1e-4
  num_epochs: 20 
  weight_decay: 1e-3
  test_size: 0.2
  random_state: 42
  mask_lines: false
  redshift_overlap: false


model:
  hidden_dims: [32, 64, 128, 256, 384]
  in_channels: 1
  sequence_length: 1024
  model_path: '../models/selected_backbone/best_spectranet.pth'


siamese_training:
  batch_size: 256
  learning_rate: 1e-3
  num_epochs: 30
  weight_decay: 1e-4
  test_size: 0.2
  random_state: 42
  decision_threshold: 0.5
  seed: 42
  min_recall: 0.5
  max_fpr: 0.05
  
  train_change_pair_prob: 0.15
  eval_change_pair_prob: 0.02