# Project paths
data:
  processed_catalog: 'data/processed_agn_catalog_cut.parquet'

# Neural Network Training Configurations
training:
  batch_size: 256
  learning_rate: 0.001
  num_epochs: 50 
  weight_decay: 1e-3
  test_size: 0.2
  random_state: 42
  mask_lines: false
  redshift_overlap: false

model:
  hidden_dims: [32, 64, 128, 256, 384]
  in_channels: 1
  sequence_length: 1024
